# Pre-commit hooks — mirrors the CI lint checks so failures are caught locally.
# Install: pre-commit install
# Run manually: pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/psf/black
    rev: 23.12.0
    hooks:
      - id: black
        language_version: python3.11
        files: ^backend/
        args: ["--config", "backend/pyproject.toml"]

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: ^backend/
        args: ["--settings-path", "backend/pyproject.toml"]

  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        files: ^backend/app/
        args: ["--max-line-length=127", "--max-complexity=12",
               "--select=E9,F63,F7,F82,W,C,E"]
        additional_dependencies:
          - flake8-bugbear==24.1.17
          - flake8-comprehensions==3.14.0

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        files: ^backend/app/
        args: ["-ll", "-ii", "--exclude", "backend/tests"]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^frontend/
        types_or: [ts, tsx, json, css]
        exclude: ^frontend/storefront/dist/

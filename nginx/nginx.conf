##############################################
#  Nginx Reverse Proxy — E-Commerce Platform
##############################################

# Number of worker processes (auto = one per CPU core)
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ───────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # ── Gzip Compression ─────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Rate Limiting Zones ───────────────────────
    # General API: 60 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    # Auth endpoints: 10 req/min per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # ── Upstream Backends ─────────────────────────
    upstream backend_api {
        least_conn;
        server backend:8000;
        keepalive 32;
    }

    upstream storefront {
        server storefront:5173;
        keepalive 16;
    }

    # ── Security Headers Map ──────────────────────
    map $sent_http_content_type $x_content_type_options {
        default "nosniff";
    }

    # ── HTTP → HTTPS redirect (when SSL is enabled) ──
    # Uncomment this block when you add SSL certificates:
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ── Main Server Block ─────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Security Headers ─────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header X-Request-ID              $request_id    always;

        # ── Health Check (bypass rate limit) ─────
        location = /health {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            access_log off;
        }

        # ── API Routes → FastAPI backend ─────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_set_header   Connection        "";

            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;

            proxy_buffer_size          4k;
            proxy_buffers              8 4k;
            proxy_busy_buffers_size    8k;
        }

        # ── Auth endpoints — stricter rate limit ──
        location ~ ^/api/v1/auth/(login|register|token) {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── WebSocket support (for future use) ───
        location /ws/ {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400s;
        }

        # ── Static file uploads ───────────────────
        location /uploads/ {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ── Storefront (React/Vite) ───────────────
        location / {
            proxy_pass         http://storefront;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";  # needed for Vite HMR

            # Cache HTML — no cache; cache assets aggressively
            location ~* \.(js|css|woff2|woff|ttf|svg|ico|png|jpg|webp)$ {
                proxy_pass http://storefront;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── Prometheus metrics (internal only) ───
        location /metrics {
            allow 172.16.0.0/12;  # Docker networks
            allow 10.0.0.0/8;
            deny  all;

            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
        }

        # ── Error pages ───────────────────────────
        error_page 429 /429.html;
        location = /429.html {
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please slow down."}';
            add_header Content-Type application/json always;
        }

        error_page 502 503 504 /5xx.html;
        location = /5xx.html {
            return 503 '{"error":"Service Unavailable","message":"The server is temporarily unavailable."}';
            add_header Content-Type application/json always;
        }
    }

    # ── HTTPS Server Block ────────────────────────
    # Uncomment and configure with your SSL certs:
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:...;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #
    #     # HSTS (uncomment after confirming HTTPS works)
    #     # add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     # ... rest of location blocks same as HTTP above
    # }
}

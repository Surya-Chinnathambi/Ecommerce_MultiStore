[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    -ra
    --tb=short
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks tests requiring live DB/Redis
    unit: marks pure unit tests with no external deps
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy.*
    ignore::DeprecationWarning:passlib.*

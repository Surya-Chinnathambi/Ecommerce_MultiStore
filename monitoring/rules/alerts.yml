# ──────────────────────────────────────────────────────
#  Alerting rules — FastAPI / Celery / Redis
# ──────────────────────────────────────────────────────
groups:
  - name: api_alerts
    rules:
      # High error rate — more than 5% of requests return 5xx in the last 5 min
      - alert: HighErrorRate
        expr: |
          (
            rate(http_requests_total{status_code=~"5.."}[5m])
            /
            rate(http_requests_total[5m])
          ) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error rate ({{ $value | humanizePercentage }})"
          description: "More than 5% of requests are returning 5xx errors."

      # Slow API — p95 latency above 2 seconds
      - alert: SlowApiLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency above 2s ({{ $value }}s)"
          description: "95th percentile response time is above 2 seconds."

      # Backend down — no scrape data for 1 minute
      - alert: BackendDown
        expr: up{job="fastapi_backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "FastAPI backend is unreachable"
          description: "Prometheus cannot scrape the backend /metrics endpoint."

services:
  # PostgreSQL Database (E-commerce)
  db:
    image: postgres:15-alpine
    container_name: ecommerce_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No direct ports for DB; reachable via internal network only
    # ports:
    #   - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # React Storefront (production: Nginx serving built static files)
  storefront:
    build:
      context: ./frontend/storefront
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_WS_URL: ws://localhost/api/v1
    image: ecommerce-platform-storefront:latest
    container_name: ecommerce_storefront
    restart: unless-stopped

  # Nginx Reverse Proxy (single entry-point: port 80)
  nginx:
    image: nginx:1.25-alpine
    container_name: ecommerce_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      # Uncomment for HTTPS (requires certs mounted):
      # - "443:443"
    depends_on:
      - backend
      - storefront
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_backend
    # Dev mode: override CMD with hot-reload uvicorn (skips gunicorn)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - backend/.env
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    # ports:
    #   - "8000:8000" # Traffic strictly via Nginx in semi-prod/hardened mode
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1G
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Worker — processes background tasks
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_celery_worker
    # Override entrypoint CMD: skip gunicorn, run celery worker instead
    command: >
      celery -A app.celery_app.celery_app worker --loglevel=info -Q default,sync_queue,order_queue,analytics_queue,notifications_queue --concurrency=4 --max-tasks-per-child=1000 --hostname=worker@%h
    env_file:
      - backend/.env
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "celery -A app.celery_app.celery_app inspect ping -d worker@$$HOSTNAME || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Celery Beat — periodic task scheduler
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_celery_beat
    command: >
      celery -A app.celery_app.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler --schedule=/var/celerybeat/celerybeat-schedule
    env_file:
      - backend/.env
    volumes:
      - ./backend:/app
      - celerybeat_data:/var/celerybeat
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  celerybeat_data:
  backend_uploads:
  backend_logs:
